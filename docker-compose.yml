services:

  db:
    image: postgres:15-alpine
    container_name: employee-panel-db
    environment:
      - POSTGRES_DB=${DB_DATABASE:-employee_panel}
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-secret}
    ports:
      - "5441:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: employee-panel-app
    volumes:
      - .:/var/www/html:delegated
      - /var/www/html/vendor
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8082
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      # - APP_KEY=${APP_KEY}
      - DB_DATABASE=${DB_DATABASE:-employee_panel}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - QUEUE_CONNECTION=database
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/var/www/html/entrypoint.sh"]
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: employee-panel-nginx
    ports:
      - "8082:80"
    volumes:
      - .:/var/www/html:delegated
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: employee-panel-queue
    command: php artisan queue:work --tries=3 --sleep=3
    volumes:
      - .:/var/www/html:delegated
      - /var/www/html/vendor
    environment:
      - APP_ENV=local
      # - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-employee_panel}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - QUEUE_CONNECTION=database
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
